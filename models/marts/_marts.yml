version: 2

models:
  - name: fct_orders
    description: >
      Fact table containing one row per order. It combines order data with
      the total amount from successful payments associated with each order.

    columns:
      - name: order_id
        description: Unique identifier of the order.
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Identifier of the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_date
        description: Date when the order was placed.
        data_tests:
          - not_null

      - name: amount
        description: >
          Total value, in dollars, of successful payments associated with
          the order. Orders without successful payments receive a value of zero.
        data_tests:
          - not_null

  - name: dim_customers
    description: >
      Customer dimension containing one row per customer, enriched with
      aggregated information about their order history.

    columns:
      - name: customer_id
        description: Unique identifier of the customer.
        data_tests:
          - unique
          - not_null

      - name: first_name
        description: Customer's first name.

      - name: last_name
        description: Customer's last name.

      - name: first_order_date
        description: Date of the customer's first order.

      - name: most_recent_order_date
        description: Date of the customer's most recent order.

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        data_tests:
          - not_null

      - name: lifetime_value
        description: >
          Total value, in dollars, of all successful payments associated
          with the customer's orders.
        data_tests:
          - not_null
